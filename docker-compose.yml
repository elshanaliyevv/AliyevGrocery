services:
  postgres:
    image: postgres:16-alpine
    container_name: aliyev-grocery-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aliyev_grocery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "8081:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aliyev_grocery"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
